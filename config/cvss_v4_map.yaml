version: "4.0"

# ---------- GLOBAL DEFAULTS ----------
defaults:
  base:
    AV: N
    AC: L
    AT: N
    PR: N
    UI: N
    VC: L
    VI: L
    VA: L
    SC: N
    SI: N
    SA: N
  threat:
    E: U   # Unknown
  environmental_profiles:
    consumer:   { CR: M, IR: M, AR: M }
    enterprise: { CR: H, IR: H, AR: H }
  supplemental:
    safety: N
    automatable: N
    value_density: N

# ---------- MERGE & PRECEDENCE ----------
# How the calculator should combine defaults + rule-specific values:
# 1) Start with defaults.base/threat/env/supplemental
# 2) Apply rule.base (override keys present)
# 3) If rule.overrides.* present, enforce post-processing (e.g., severity_cap)
# 4) Build B; add Threat E for BT; add Env CR/IR/AR for BE; add both for BTE
# 5) Round to 1 decimal
merge:
  severity_caps:
    # If set on a rule, cap the *reported* severity tier used by non-CVSS rollups (does not change CVSS)
    allowed: ["Info","Low","Medium","High","Critical"]

# ---------- RULES ----------
rules:

  # ===== Manifest / Network posture =====
  - detector_id: BASE-CLR-001                   # usesCleartextTraffic=true
    base: { AV: N, AC: L, AT: N, PR: N, UI: N, VC: L, VI: L, VA: N, SC: N, SI: N, SA: N }
    rationale: >
      Cleartext traffic allowed by manifest. If exercised by runtime HTTP libs,
      attacker-in-the-middle can inspect or modify unpinned traffic.
    evidence_hints:
      - "AndroidManifest.xml: usesCleartextTraffic"

  - detector_id: NSC-USERCA-ALLOWED             # user-added CAs accepted
    base: { AV: N, AC: L, AT: N, PR: N, UI: N, VC: L, VI: L, VA: N }
    rationale: >
      Network Security Config allows user-added CAs; enables local interception on rooted/user-modified trust stores.
    evidence_hints:
      - "res/xml/network_security_config*.xml"
      - "trust-anchors: certificates='user'"

  - detector_id: NSC-PINNING-ABSENT              # no pinning where high-value hosts exist
    base: { AV: N, AC: L, AT: N, PR: N, UI: N, VC: L, VI: L, VA: N }
    rationale: >
      No certificate pinning for high-value endpoints; increases MITM surface if trust store is compromised.
    evidence_hints:
      - "networkSecurityConfig present but no pins for in-scope hosts"

  # ===== Storage posture =====
  - detector_id: BASE-STO-LEGACY                # requestLegacyExternalStorage=true
    base: { AV: L, AC: L, AT: N, PR: N, UI: N, VC: L, VI: N, VA: N }
    rationale: >
      Legacy external storage widens data exposure via world-readable paths.
    evidence_hints:
      - "AndroidManifest.xml: requestLegacyExternalStorage"

  - detector_id: FILEPROVIDER-WEAK-ACL          # FileProvider grants overly-broad URI perms
    base: { AV: A, AC: L, AT: N, PR: N, UI: R, VC: L, VI: N, VA: N }
    rationale: >
      Weak FileProvider modes (grantUriPermissions without strict pathStrategy) may leak content via exported receivers.
    evidence_hints:
      - "AndroidManifest.xml: <provider ... android:name=FileProvider>"
      - "res/xml/file_paths.xml"

  # ===== IPC / Exported components =====
  - detector_id: BASE-IPC-PROVIDER-NO-ACL
    base: { AV: A, AC: L, AT: N, PR: N, UI: N, VC: L, VI: L, VA: N }
    rationale: >
      Exported ContentProvider without permission guard allows unauthorized data access or mutation.
    evidence_hints:
      - "<provider ... exported=true>"
      - "Missing android:readPermission and android:writePermission"

  - detector_id: BASE-IPC-EXPORTED-WITH-PERM
    base: { AV: A, AC: L, AT: N, PR: L, UI: N, VC: N, VI: N, VA: N }
    rationale: >
      Component is exported but guarded by a permission; residual risk limited.
    overrides: { severity_cap: Info }

  - detector_id: IPC-RECEIVER-IMPLICIT-EXPORTED # exported receiver with broad filter, no perm
    base: { AV: A, AC: L, AT: N, PR: N, UI: N, VC: N, VI: L, VA: N }
    rationale: >
      BroadcastReceiver exported without permission or signature-level guard; external apps can trigger behaviors.

  - detector_id: IPC-ACTIVITY-TASKINJECTION     # exported activity taskAffinity/singleTask misuse
    base: { AV: A, AC: L, AT: N, PR: N, UI: N, VC: N, VI: L, VA: N }
    rationale: >
      Exported activity with risky task flags can enable UI hijacking or deep-link abuse.

  # ===== WebView posture =====
  - detector_id: WV-MIXED-CONTENT
    base: { AV: N, AC: L, AT: N, PR: N, UI: R, VC: L, VI: N, VA: N }
    rationale: >
      WebView allows mixed content; user navigation required to trigger downgrade.

  - detector_id: WV-JS-ENABLED-UNBRIDGED        # JS enabled but no JS interface
    base: { AV: N, AC: L, AT: N, PR: N, UI: R, VC: N, VI: N, VA: N }
    rationale: >
      JavaScript enabled; risk increases if combined with file:// or addJavascriptInterface.

  - detector_id: WV-JS-BRIDGE-EXPOSED           # addJavascriptInterface() to non-@JavascriptInterface or broad
    base: { AV: N, AC: L, AT: N, PR: N, UI: R, VC: L, VI: L, VA: N }
    rationale: >
      JS bridge exposes native surface to web content; with XSS or hostile pages, can lead to code execution.

  # ===== Strings / endpoints =====
  - detector_id: STRING-ENDPOINT-HTTP-NONLOCAL  # http:// non-local endpoint literal
    base: { AV: N, AC: L, AT: N, PR: N, UI: N, VC: L, VI: N, VA: N }
    rationale: >
      Hard-coded cleartext HTTP endpoint; enables eavesdropping if used at runtime.
    evidence_hints:
      - "classes*.dex@..."
      - "res/raw/... keep.xml (noise—apply allowlist)"

  - detector_id: STRING-ENDPOINT-LOCALHOST      # http://localhost or 127.0.0.1
    base: { AV: L, AC: L, AT: N, PR: N, UI: N, VC: N, VI: N, VA: N }
    rationale: >
      Localhost endpoints generally non-exploitable in release builds; treat as low informational unless corroborated.
    overrides: { severity_cap: Info }

  - detector_id: STR-SECRET-AWS-HC              # high-confidence cloud secret
    base: { AV: N, AC: L, AT: N, PR: N, UI: N, VC: L, VI: L, VA: N, SC: L, SI: L, SA: N }
    threat: { E: P }
    rationale: >
      High-confidence cloud credential in code/assets. If active, enables unauthorized API calls; may impact downstream systems.
    evidence_hints:
      - "classes*.dex@..."
      - "assets/... (Tags: aws_secret)"

  - detector_id: STR-SECRET-GCP-HC              # gcp key/service acct
    base: { AV: N, AC: L, AT: N, PR: N, UI: N, VC: L, VI: L, VA: N, SC: L, SI: L, SA: N }
    threat: { E: P }
    rationale: >
      GCP credential/key discovered; potential access to buckets/APIs if live.

  - detector_id: STR-SECRET-GAPI-MAPS           # Google Maps API key
    base: { AV: N, AC: L, AT: N, PR: N, UI: N, VC: L, VI: N, VA: N }
    rationale: >
      Google API key discovered; risk depends on key restrictions. Treat as Low unless unrestricted confirmed.
    overrides: { severity_cap: Low }

  - detector_id: STR-JWT-TOKEN-CANDIDATE
    base: { AV: N, AC: L, AT: N, PR: N, UI: N, VC: L, VI: L, VA: N }
    rationale: >
      JWT-like token candidate; validate issuer/audience/expiry when feasible to raise confidence.

  - detector_id: STR-ENTROPY-ASSET
    base: { AV: N, AC: H, AT: R, PR: N, UI: N, VC: N, VI: N, VA: N }
    rationale: >
      High-entropy blob in non-executable asset; treat as noise unless corroborated.
    overrides: { severity_cap: Info }

  # ===== Crypto / TLS =====
  - detector_id: CRYPTO-MD5
    base: { AV: N, AC: L, AT: N, PR: N, UI: N, VC: N, VI: L, VA: N }
    rationale: >
      MD5 used for security-sensitive purpose; collisions feasible.

  - detector_id: CRYPTO-SHA1
    base: { AV: N, AC: L, AT: N, PR: N, UI: N, VC: N, VI: L, VA: N }
    rationale: >
      SHA-1 used in security context; consider stronger hash.

  - detector_id: TLS-SSLV3-REF
    base: { AV: N, AC: L, AT: N, PR: N, UI: N, VC: L, VI: N, VA: N }
    rationale: >
      Reference to SSLv3/obsolete cipher; if reachable at runtime, risks downgrade/weak crypto.

  # ===== Dynamic loading / code exec =====
  - detector_id: DYNLOAD-DEXCLASSLOADER
    base: { AV: N, AC: L, AT: R, PR: N, UI: N, VC: N, VI: L, VA: N }
    rationale: >
      DexClassLoader/PathClassLoader used; risk depends on source (network/tmp). Raise if combined with cleartext.

  - detector_id: DYNLOAD-SYSTEM-LOADLIB         # System.loadLibrary/System.load with external path
    base: { AV: N, AC: L, AT: R, PR: N, UI: N, VC: N, VI: L, VA: N }
    rationale: >
      Native library load from non-app-private dir may allow DLL hijack if writeable by attacker.

  # ===== Permissions / Privacy =====
  - detector_id: PERM-HIGH-SIGNAL-UNJUSTIFIED   # CAMERA/RECORD_AUDIO/CONTACTS etc. w/o justification
    base: { AV: N, AC: L, AT: N, PR: N, UI: N, VC: L, VI: N, VA: N }
    rationale: >
      High-signal permission declared without matching capability artifacts; increases privacy risk.

  - detector_id: PRIV-TRACKING-SDK-COUNT>=2
    base: { AV: N, AC: L, AT: N, PR: N, UI: N, VC: L, VI: N, VA: N }
    rationale: >
      Multiple tracking SDKs detected; increases re-identification risk.
    supplemental: { value_density: Y }

  - detector_id: PRIV-PRIVACY-UX-MISSING        # no consent strings/links detected (static-only proxy)
    base: { AV: N, AC: L, AT: N, PR: N, UI: N, VC: N, VI: N, VA: N }
    rationale: >
      No privacy/consent artifacts found in static resources; inconclusive but noteworthy.
    overrides: { severity_cap: Info }

  # ===== Misc platform flags =====
  - detector_id: BASE-ALLOWBACKUP-ENABLED
    base: { AV: L, AC: L, AT: N, PR: N, UI: N, VC: L, VI: N, VA: N }
    rationale: >
      android:allowBackup=true; increases data extraction surface via ADB backup if not restricted.
    overrides: { severity_cap: Low }
