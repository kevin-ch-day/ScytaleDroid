[tool.ruff]
line-length = 100
target-version = "py313"
src = ["scytaledroid", "scripts", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.pyupgrade]
py311_plus = true
keep-runtime-typing = true

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
scripts_are_modules = true
pretty = true
warn_unused_ignores = true
show_error_codes = true

[tool.pytest.ini_options]
markers = [
    "integration: marks tests that exercise database integrations (deselect with '-m \"not integration\"')",
    "unit: marks hermetic unit tests",
    "contract: active architectural or operator-facing contract coverage",
    "ui_contract: menu/dashboard/terminology/state-block contract coverage",
    "state_contract: state-service or controller/state boundary coverage",
    "report_contract: builder/report/persistence/output meaning coverage",
    "slow: materially slower or higher-cost tests",
    "gate: broad policy, lexical, compile, or schema guard coverage",
    "db_live: tests that depend on reachable canonical DB behavior or DB-specific environment",
    "legacy_contract: compatibility or transition behavior still protected",
    "retire_with_code: legacy test intended to retire with its related compatibility seam",
    "tier3: heavy or infrequent verification coverage",
]
