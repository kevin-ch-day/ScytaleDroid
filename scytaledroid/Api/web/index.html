<!doctype html>
<html lang="en">
      <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ScytaleDroid UI</title>
    <link rel="stylesheet" href="/assets/css/colors.css" />
    <link rel="stylesheet" href="/assets/css/core.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/forms.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/tables.css" />
  </head>
<body data-page-title="Home">
    <div class="app-shell">
      <aside id="sidebar" class="sidebar"></aside>
      <div class="app-main">
        <div id="pageHeader" class="page-header"></div>
        <main class="container">
      <div class="card">
        <h2>Quick Links</h2>
        <p class="muted">Navigate by app version first; runs are treated as execution history.</p>
        <div class="row">
          <a class="badge" href="/ui/apps">Apps</a>
          <a class="badge" href="/ui/upload">Upload & Scan</a>
          <a class="badge" href="/ui/jobs">Jobs</a>
          <a class="badge" href="/ui/runs">Runs (debug)</a>
        </div>
      </div>

      <div class="card">
        <h2>Health Summary</h2>
        <div id="healthStatus" class="muted">Loading...</div>
        <div class="stat-grid" id="healthCards"></div>
      </div>

      <div class="card">
        <h2>Apps (Latest Completed Run)</h2>
        <div id="appsStatus" class="muted">Loading...</div>
        <table>
          <thead>
            <tr>
              <th>App</th>
              <th>Package</th>
              <th>Version</th>
              <th>Status</th>
              <th>Last Analyzed</th>
              <th>Report</th>
            </tr>
          </thead>
          <tbody id="appsTable"></tbody>
        </table>
      </div>
      <div class="card">
        <h2>Recent Jobs</h2>
        <div id="jobsStatus" class="muted">Loading...</div>
        <table>
          <thead>
            <tr>
              <th>Job</th>
              <th>State</th>
              <th>App</th>
              <th>Queued</th>
            </tr>
          </thead>
          <tbody id="jobsTable"></tbody>
        </table>
      </div>
        </main>
        <footer id="pageFooter" class="page-footer"></footer>
      </div>
    </div>
  
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/ui.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/pages/upload.js"></script>
    <script src="/assets/js/pages/jobs.js"></script>
    <script src="/assets/js/pages/runs.js"></script>
    <script src="/assets/js/pages/apps.js"></script>
    <script src="/assets/js/pages/run.js"></script>
    <script src="/assets/js/pages/report.js"></script>
    <script src="/assets/js/pages/ops.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/layout.js"></script>
    <script src="/assets/js/header.js"></script>
    <script src="/assets/js/footer.js"></script>
  </body>
</html>
