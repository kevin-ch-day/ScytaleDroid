<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ScytaleDroid UI</title>
    <link rel="stylesheet" href="/assets/theme.css" />
    <link rel="stylesheet" href="/assets/base.css" />
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div>
          <h1>ScytaleDroid UI</h1>
          <div class="muted">Local operator console</div>
        </div>
        <nav>
          <a href="/ui/upload">Upload</a>
          <a href="/ui/jobs">Jobs</a>
          <a href="/ui/runs">Runs</a>
        </nav>
      </header>

      <div class="card">
        <h2>Quick Links</h2>
        <p class="muted">Use the pages below to upload APKs, track jobs, and inspect run summaries.</p>
        <div class="row">
          <a class="badge" href="/ui/upload">Upload & Scan</a>
          <a class="badge" href="/ui/jobs">Jobs</a>
          <a class="badge" href="/ui/runs">Recent Runs</a>
        </div>
      </div>

      <div class="card">
        <h2>Health Summary</h2>
        <div id="healthStatus" class="muted">Loading...</div>
        <div class="row" id="healthCards"></div>
      </div>

      <div class="card">
        <h2>Recent Runs</h2>
        <div id="runsStatus" class="muted">Loading...</div>
        <table>
          <thead>
            <tr>
              <th>Session</th>
              <th>Status</th>
              <th>Package</th>
              <th>Open</th>
            </tr>
          </thead>
          <tbody id="runsTable"></tbody>
        </table>
      </div>
    </div>
    <script src="/assets/api.js"></script>
    <script src="/assets/ui.js"></script>
    <script src="/assets/app.js"></script>
  </body>
</html>
