<!doctype html>
<html lang="en">
      <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Runs (Debug)</title>
    <link rel="stylesheet" href="/assets/css/colors.css" />
    <link rel="stylesheet" href="/assets/css/core.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/forms.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/tables.css" />
  </head>
<body data-page-title="Runs (Debug)">
    <div class="app-shell">
      <aside id="sidebar" class="sidebar"></aside>
      <div class="app-main">
        <div id="pageHeader" class="page-header"></div>
        <main class="container">
      <div class="card">
        <div class="row">
          <div class="field">
            <label for="runsSearch">Search</label>
            <input id="runsSearch" type="text" placeholder="Package or display name" />
          </div>
          <div class="field">
            <label for="runsProfile">Profile</label>
            <select id="runsProfile">
              <option value="">All profiles</option>
            </select>
          </div>
          <div class="field">
            <label for="runsLimit">Limit</label>
            <input id="runsLimit" type="number" min="1" max="500" value="25" />
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button id="runsApply" class="btn">Apply</button>
          </div>
        </div>
        <div id="runsStatus" class="muted">Loading...</div>
        <table>
          <thead>
            <tr>
              <th>App</th>
              <th>Version</th>
              <th>Status</th>
              <th>Last Finished</th>
              <th>Open</th>
            </tr>
          </thead>
          <tbody id="runsTable"></tbody>
        </table>
      </div>
        </main>
        <footer id="pageFooter" class="page-footer"></footer>
      </div>
    </div>
  
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/ui.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/pages/upload.js"></script>
    <script src="/assets/js/pages/jobs.js"></script>
    <script src="/assets/js/pages/runs.js"></script>
    <script src="/assets/js/pages/apps.js"></script>
    <script src="/assets/js/pages/run.js"></script>
    <script src="/assets/js/pages/report.js"></script>
    <script src="/assets/js/pages/ops.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/layout.js"></script>
    <script src="/assets/js/header.js"></script>
    <script src="/assets/js/footer.js"></script>
  </body>
</html>
