<!doctype html>
<html lang="en">
      <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Apps</title>
    <link rel="stylesheet" href="/assets/css/colors.css" />
    <link rel="stylesheet" href="/assets/css/core.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/forms.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/tables.css" />
  </head>
<body data-page-title="Apps">
    <div class="app-shell">
      <aside id="sidebar" class="sidebar"></aside>
      <div class="app-main">
        <div id="pageHeader" class="page-header"></div>
        <main class="container">
          <div class="card">
            <h2>Apps & Latest Runs</h2>
            <div class="row">
              <div class="field">
                <label for="appsSearch">Search</label>
                <input id="appsSearch" type="text" placeholder="Package or display name" />
              </div>
              <div class="field">
                <label for="appsProfile">Profile</label>
                <select id="appsProfile">
                  <option value="">All profiles</option>
                </select>
              </div>
              <div class="field">
                <label for="appsLimit">Limit</label>
                <input id="appsLimit" type="number" min="1" max="500" value="50" />
              </div>
              <div class="field">
                <label>&nbsp;</label>
                <button id="appsApply" class="btn">Apply</button>
              </div>
            </div>
            <div id="appsStatus" class="muted">Loading...</div>
            <table>
              <thead>
                <tr>
                  <th>App</th>
                  <th>Package</th>
                  <th>Version</th>
                  <th>Status</th>
                  <th>Last Analyzed</th>
                  <th>Report</th>
                </tr>
              </thead>
              <tbody id="appsTable"></tbody>
            </table>
          </div>
        </main>
        <footer id="pageFooter" class="page-footer"></footer>
      </div>
    </div>
  
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/ui.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/pages/upload.js"></script>
    <script src="/assets/js/pages/jobs.js"></script>
    <script src="/assets/js/pages/runs.js"></script>
    <script src="/assets/js/pages/apps.js"></script>
    <script src="/assets/js/pages/run.js"></script>
    <script src="/assets/js/pages/report.js"></script>
    <script src="/assets/js/pages/ops.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/layout.js"></script>
    <script src="/assets/js/header.js"></script>
    <script src="/assets/js/footer.js"></script>
  </body>
</html>
