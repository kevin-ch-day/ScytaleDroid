<!doctype html>
<html lang="en">
      <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Run Viewer</title>
    <link rel="stylesheet" href="/assets/css/colors.css" />
    <link rel="stylesheet" href="/assets/css/core.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/forms.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/tables.css" />
  </head>
<body data-page-title="Run Viewer">
    <div class="app-shell">
      <aside id="sidebar" class="sidebar"></aside>
      <div class="app-main">
        <div id="pageHeader" class="page-header"></div>
        <main class="container">
          <div class="card">
        <div id="runStatus" class="muted">Loading...</div>
        <div id="runSummary" class="muted"></div>
        <pre id="runCounts" class="muted"></pre>
        <div class="row">
          <a class="badge" id="statusLink">Status JSON</a>
          <a class="badge" id="reportLink">Report JSON</a>
          <a class="badge" id="evidenceLink">Evidence ZIP</a>
        </div>
      </div>
        </main>
        <footer id="pageFooter" class="page-footer"></footer>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const session = params.get("session");
      if (session) {
        document.getElementById("statusLink").href = `/run/${session}/status`;
        document.getElementById("reportLink").href = `/run/${session}/report.json`;
        document.getElementById("evidenceLink").href = `/run/${session}/evidence.zip`;
      }
    </script>
  
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/ui.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/pages/upload.js"></script>
    <script src="/assets/js/pages/jobs.js"></script>
    <script src="/assets/js/pages/runs.js"></script>
    <script src="/assets/js/pages/apps.js"></script>
    <script src="/assets/js/pages/run.js"></script>
    <script src="/assets/js/pages/report.js"></script>
    <script src="/assets/js/pages/ops.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/layout.js"></script>
    <script src="/assets/js/header.js"></script>
    <script src="/assets/js/footer.js"></script>
  </body>
</html>
