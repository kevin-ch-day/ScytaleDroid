<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Report Viewer</title>
    <link rel="stylesheet" href="/assets/theme.css" />
    <link rel="stylesheet" href="/assets/base.css" />
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body data-page-title="Report Viewer">
    <div class="app-shell">
      <aside id="sidebar" class="sidebar"></aside>
      <div class="app-main">
        <div id="pageHeader" class="page-header"></div>
        <main class="container">
          <div class="card">
            <div id="reportStatus" class="muted">Loading report…</div>
            <div id="reportHeader" class="stat-grid"></div>
          </div>
          <div class="card">
            <h2>Findings Summary</h2>
            <div id="reportFindings" class="stat-grid"></div>
          </div>
          <div class="card">
            <h2>Detectors</h2>
            <div id="reportDetectors" class="muted">No detector data.</div>
          </div>
          <div class="card">
            <h2>Report JSON</h2>
            <pre id="reportJson" class="muted"></pre>
          </div>
        </main>
        <footer id="pageFooter" class="page-footer"></footer>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/assets/api.js"></script>
    <script src="/assets/ui.js"></script>
    <script src="/assets/layout.js"></script>
    <script src="/assets/header.js"></script>
    <script src="/assets/footer.js"></script>
    <script src="/assets/app.js"></script>
  </body>
</html>
