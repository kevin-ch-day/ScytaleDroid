<!doctype html>
<html lang="en">
      <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Operations</title>
    <link rel="stylesheet" href="/assets/css/colors.css" />
    <link rel="stylesheet" href="/assets/css/core.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/forms.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/tables.css" />
  </head>
<body data-page-title="Operations">
    <div class="app-shell">
      <aside id="sidebar" class="sidebar"></aside>
      <div class="app-main">
        <div id="pageHeader" class="page-header"></div>
        <main class="container">
          <div class="card">
            <h2>DB Health Summary</h2>
            <div id="opsHealthStatus" class="muted">Loading...</div>
            <div id="opsHealthCards" class="stat-grid"></div>
          </div>
          <div class="card">
            <h2>Finalize Stale Runs</h2>
            <p class="muted">Mark RUNNING runs older than the selected threshold as FAILED.</p>
            <div class="row">
              <div>
                <label for="staleMinutes">Threshold (minutes)</label>
                <input id="staleMinutes" type="text" value="60" />
              </div>
              <div>
                <label>&nbsp;</label>
                <button id="finalizeBtn">Finalize stale runs</button>
              </div>
            </div>
            <p id="finalizeStatus" class="muted">No action yet.</p>
          </div>
        </main>
        <footer id="pageFooter" class="page-footer"></footer>
      </div>
    </div>
  
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/ui.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/pages/upload.js"></script>
    <script src="/assets/js/pages/jobs.js"></script>
    <script src="/assets/js/pages/runs.js"></script>
    <script src="/assets/js/pages/apps.js"></script>
    <script src="/assets/js/pages/run.js"></script>
    <script src="/assets/js/pages/report.js"></script>
    <script src="/assets/js/pages/ops.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/layout.js"></script>
    <script src="/assets/js/header.js"></script>
    <script src="/assets/js/footer.js"></script>
  </body>
</html>
